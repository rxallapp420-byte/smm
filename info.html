<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RX RABBI  PLAYER INFO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', 'Rajdhani', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)),
                url('https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1920&q=80') no-repeat center center / cover;
            background-attachment: fixed;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 0;
        }
        .app-container {
            width: 100%; max-width: 550px; margin: 0 auto; padding: 1.2rem;
            display: flex; flex-direction: column; gap: 1.2rem;
            position: relative; height: 100vh; overflow-y: auto; overflow-x: hidden;
        }
        #splashScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            background-image: radial-gradient(circle at center, rgba(0, 255, 200, 0.2) 0%, transparent 70%),
                linear-gradient(180deg, #000a0a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        
        .splash-logo-inner img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .splash-title {
            font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; letter-spacing: 4px; color: #fff;
            text-shadow: 0 0 20px rgba(0, 255, 200, 0.8), 0 0 40px rgba(0, 255, 200, 0.4), 0 4px 8px rgba(0, 0, 0, 0.8);
            margin-bottom: 0.5rem; text-align: center; line-height: 1.3;
        }
        .splash-subtitle {
            font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 3px;
            color: rgba(0, 255, 200, 0.8); margin-bottom: 2rem;
        }
        .custom-loader { display: flex; gap: 6px; align-items: center; }
        .loader-dot {
            width: 10px; height: 10px; border-radius: 50%; background: #00ffcc;
            animation: dotBounce 1.4s infinite; box-shadow: 0 0 10px rgba(0, 255, 200, 0.8);
        }
        .loader-dot:nth-child(1) { animation-delay: 0s; }
        .loader-dot:nth-child(2) { animation-delay: 0.2s; }
        .loader-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1.3); opacity: 1; } }
        #mainApp { display: none; flex-direction: column; gap: 1.2rem; width: 100%; animation: fadeInContent 0.8s ease; height: 100%; }
        @keyframes fadeInContent { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .header { display: flex; align-items: center; justify-content: center; gap: 0.8rem; margin-bottom: 0; flex-wrap: wrap; }
        
        .header-logo-inner img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .header-text { text-align: center; }
        .header h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; background: linear-gradient(135deg, #fff 0%, #00ffcc 40%, #00e5b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 2px 8px rgba(0, 255, 200, 0.3)); }
        .header .subtitle { font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; font-weight: 500; letter-spacing: 1px; color: rgba(0, 255, 200, 0.7); margin-top: 0.3rem; }
        .music-player {
            background: rgba(0, 20, 20, 0.55); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border-radius: 1rem; padding: 0.7rem 1rem; display: flex; align-items: center; gap: 0.75rem;
            border: 1px solid rgba(0, 255, 200, 0.25);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.02);
            position: relative; overflow: hidden; transition: all 0.4s ease; min-height: 56px; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .music-player.playing { border-color: rgba(0, 255, 200, 0.55); box-shadow: 0 4px 25px rgba(0, 255, 200, 0.2), 0 0 50px rgba(0, 255, 200, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.03); }
        .music-player::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0, 255, 200, 0.5), transparent); opacity: 0.7; }
        .music-player.playing::before { opacity: 1; background: linear-gradient(90deg, transparent, rgba(0, 255, 200, 0.8), transparent); }
        .eq-container { display: flex; align-items: flex-end; gap: 3px; height: 28px; flex-shrink: 0; padding: 0 2px; }
        .eq-bar { width: 3px; border-radius: 3px; background: rgba(0, 255, 200, 0.5); transition: all 0.3s ease; height: 6px; }
        .music-player.playing .eq-bar { background: #00ffcc; box-shadow: 0 0 6px rgba(0, 255, 200, 0.7); animation: eqPulse 0.85s ease-in-out infinite; }
        .music-player.playing .eq-bar:nth-child(1) { animation-delay: 0s; }
        .music-player.playing .eq-bar:nth-child(2) { animation-delay: 0.18s; }
        .music-player.playing .eq-bar:nth-child(3) { animation-delay: 0.36s; }
        .music-player.playing .eq-bar:nth-child(4) { animation-delay: 0.54s; }
        @keyframes eqPulse { 0%, 100% { height: 5px; } 30% { height: 18px; } 60% { height: 26px; } 85% { height: 10px; } }
        .song-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
        .song-label { font-family: 'Rajdhani', sans-serif; font-size: 0.6rem; font-weight: 600; letter-spacing: 2px; color: rgba(0, 255, 200, 0.6); text-transform: uppercase; }
        .song-name { font-family: 'Poppins', sans-serif; font-size: 0.82rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.3px; transition: color 0.3s; }
        .music-player.playing .song-name { color: #fff; text-shadow: 0 0 12px rgba(0, 255, 200, 0.3); }
        .song-duration { font-family: 'Rajdhani', sans-serif; font-size: 0.65rem; font-weight: 500; color: rgba(0, 255, 200, 0.45); letter-spacing: 0.5px; }
        .music-controls { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
        .music-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(0, 255, 200, 0.35); background: rgba(0, 255, 200, 0.1); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; font-size: 0.85rem; flex-shrink: 0; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        .music-btn:hover { background: rgba(0, 255, 200, 0.25); border-color: #00ffcc; box-shadow: 0 4px 15px rgba(0, 255, 200, 0.3); transform: translateY(-2px); }
        .music-btn:active { transform: scale(0.9); transition: transform 0.1s; }
        .music-btn.play-btn { width: 40px; height: 40px; background: linear-gradient(135deg, #00ffcc, #00e5b8); border: none; font-size: 1rem; box-shadow: 0 4px 18px rgba(0, 255, 200, 0.4); }
        .music-btn.play-btn:hover { background: linear-gradient(135deg, #00ffcc, #00e5b8); box-shadow: 0 6px 25px rgba(0, 255, 200, 0.6); transform: translateY(-2px); }
        .music-player.playing .music-btn.play-btn { background: linear-gradient(135deg, #00ffcc, #00e5b8); box-shadow: 0 6px 28px rgba(0, 255, 200, 0.55); animation: playBtnGlow 2s ease-in-out infinite; }
        @keyframes playBtnGlow { 0%, 100% { box-shadow: 0 6px 28px rgba(0, 255, 200, 0.45); } 50% { box-shadow: 0 8px 35px rgba(0, 255, 200, 0.75), 0 0 50px rgba(0, 255, 200, 0.3); } }
        .music-btn svg { width: 16px; height: 16px; fill: currentColor; pointer-events: none; }
        .music-btn.play-btn svg { width: 18px; height: 18px; }
        .volume-container { display: flex; align-items: center; gap: 0.3rem; flex-shrink: 0; }
        .volume-icon { font-size: 0.7rem; color: rgba(0, 255, 200, 0.6); cursor: pointer; transition: color 0.3s; flex-shrink: 0; }
        .volume-icon:hover { color: #00ffcc; }
        .volume-slider { -webkit-appearance: none; width: 55px; height: 3px; border-radius: 3px; background: rgba(0, 255, 200, 0.25); outline: none; cursor: pointer; transition: background 0.3s; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #00ffcc; border: 2px solid #fff; cursor: pointer; box-shadow: 0 0 10px rgba(0, 255, 200, 0.5); transition: all 0.3s; }
        .volume-slider::-webkit-slider-thumb:hover { background: #00e5b8; box-shadow: 0 0 18px rgba(0, 255, 200, 0.7); transform: scale(1.1); }
        .volume-slider::-webkit-slider-runnable-track { border-radius: 3px; }
        @media (max-width: 420px) { .volume-slider { width: 38px; } .music-btn { width: 30px; height: 30px; } .music-btn.play-btn { width: 36px; height: 36px; } .music-player { padding: 0.55rem 0.7rem; gap: 0.5rem; min-height: 48px; } .eq-container { height: 22px; gap: 2px; } .eq-bar { width: 2.5px; } .song-name { font-size: 0.72rem; } }
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; border-radius: 1.2rem; gap: 0; flex: 1; min-height: 0; }
        .slider-container::-webkit-scrollbar { display: none; }
        .page { flex: 0 0 100%; scroll-snap-align: start; padding: 0 0.2rem; overflow-y: auto; max-height: 100%; }
        .glass-card { background: rgba(0, 20, 20, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 1.2rem; padding: 1.4rem 1.2rem; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.03), inset 0 -1px 0 rgba(0, 255, 200, 0.05); border: 1px solid rgba(0, 255, 200, 0.2); color: white; position: relative; overflow: hidden; margin-bottom: 1rem; }
        .glass-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0, 255, 200, 0.5), transparent); }
        .search-section { display: flex; flex-direction: column; gap: 1rem; }
        .input-wrapper { display: flex; align-items: center; background: rgba(0, 0, 0, 0.5); border-radius: 3rem; padding: 0.3rem 0.3rem 0.3rem 1.3rem; border: 1px solid rgba(0, 255, 200, 0.3); box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5); }
        .input-wrapper:focus-within { border-color: #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 200, 0.3), inset 0 2px 8px rgba(0, 0, 0, 0.5); }
        .input-wrapper input { flex: 1; background: transparent; border: none; padding: 0.75rem 0; font-size: 1rem; color: white; outline: none; font-family: 'Rajdhani', sans-serif; font-weight: 500; letter-spacing: 0.5px; }
        .input-wrapper input::placeholder { color: rgba(0, 255, 200, 0.4); }
        .button-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn { font-family: 'Rajdhani', sans-serif; background: rgba(0, 255, 200, 0.1); border: 1px solid rgba(0, 255, 200, 0.3); padding: 0.7rem 1.2rem; border-radius: 2.5rem; font-weight: 600; font-size: 0.95rem; letter-spacing: 0.5px; color: white; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.4rem; flex: 1 1 auto; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(135deg, #00ffcc, #00e5b8); color: #000; border: none; box-shadow: 0 6px 20px rgba(0, 255, 200, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1); }
        .btn-primary:disabled { opacity: 0.5; pointer-events: none; filter: grayscale(0.3); }
        .btn:hover { background: rgba(0, 255, 200, 0.25); border-color: #00ffcc; box-shadow: 0 4px 15px rgba(0, 255, 200, 0.2); transform: translateY(-2px); }
        .btn-primary:hover { background: linear-gradient(135deg, #00ffcc, #00e5b8); box-shadow: 0 8px 30px rgba(0, 255, 200, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.2); }
        .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255, 255, 255, 0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 4px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .info-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 255, 200, 0.1); padding: 0.7rem 0; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: rgba(0, 255, 200, 0.7); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-family: 'Rajdhani', sans-serif; font-weight: 600; }
        .info-value { font-weight: 600; color: white; text-align: right; font-family: 'Poppins', sans-serif; font-size: 0.9rem; }
        .highlight { color: #00ffcc; font-weight: 700; font-family: 'Orbitron', sans-serif; font-size: 0.85rem; text-shadow: 0 0 10px rgba(0, 255, 200, 0.4); }
        .card-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: #00ffcc; letter-spacing: 1px; text-shadow: 0 0 15px rgba(0, 255, 200, 0.3); border-bottom: 2px solid rgba(0, 255, 200, 0.2); padding-bottom: 0.6rem; }
        .recent-searches { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .history-chip { font-family: 'Rajdhani', sans-serif; background: rgba(0, 255, 200, 0.15); border: 1px solid rgba(0, 255, 200, 0.4); padding: 0.4rem 1rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.5px; cursor: pointer; color: white; transition: 0.3s; }
        .history-chip:hover { background: #00ffcc; color: #000; border-color: #00ffcc; box-shadow: 0 4px 15px rgba(0, 255, 200, 0.5); transform: translateY(-2px); }
        .clear-history { font-family: 'Rajdhani', sans-serif; background: transparent; border: 1px solid rgba(0, 255, 200, 0.3); color: rgba(0, 255, 200, 0.7); padding: 0.3rem 1rem; border-radius: 2rem; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px; cursor: pointer; transition: 0.3s; }
        .clear-history:hover { background: rgba(0, 255, 200, 0.2); color: #00ffcc; }
        #backToTop { position: fixed; bottom: 1.8rem; right: 1.8rem; background: rgba(0, 255, 200, 0.2); backdrop-filter: blur(12px); border: 1px solid #00ffcc; color: white; width: 44px; height: 44px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 25px rgba(0, 255, 200, 0.3); z-index: 50; font-size: 1.2rem; font-weight: 700; }
        #backToTop:hover { background: #00ffcc; color: #000; box-shadow: 0 12px 35px rgba(0, 255, 200, 0.6); transform: translateY(-3px); }
        .footer { text-align: center; font-size: 0.75rem; font-family: 'Rajdhani', sans-serif; font-weight: 500; letter-spacing: 1px; color: rgba(0, 255, 200, 0.5); margin-top: 0.5rem; }
        .toast-message { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: rgba(0, 20, 20, 0.95); backdrop-filter: blur(14px); border: 1px solid #00ffcc; padding: 0.8rem 1.8rem; border-radius: 3rem; color: white; font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 0.5px; z-index: 999; box-shadow: 0 10px 30px rgba(0, 255, 200, 0.4); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .copy-btn-small { background: rgba(0, 255, 200, 0.2); border: 1px solid rgba(0, 255, 200, 0.4); color: #00ffcc; padding: 0.2rem 0.8rem; border-radius: 1.5rem; font-size: 0.7rem; cursor: pointer; margin-left: 0.4rem; font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 0.5px; }
        .copy-btn-small:hover { background: #00ffcc; color: #000; box-shadow: 0 4px 15px rgba(0, 255, 200, 0.5); }
        .page-indicators { display: flex; justify-content: center; gap: 0.5rem; margin: 0.5rem 0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(0, 255, 200, 0.3); cursor: pointer; }
        .dot.active { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        .images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 0.8rem; padding: 0.5rem 0; }
        .image-item { background: rgba(0, 0, 0, 0.4); border-radius: 0.8rem; padding: 0.6rem; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(0, 255, 200, 0.2); aspect-ratio: 1; position: relative; overflow: hidden; }
        .image-item img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.5)); }
        .img-placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(0, 255, 200, 0.5); font-size: 0.7rem; }
        .counter-badge { background: rgba(0, 255, 200, 0.2); border: 1px solid #00ffcc; border-radius: 2rem; padding: 0.2rem 0.8rem; font-size: 0.7rem; color: #00ffcc; margin-bottom: 0.5rem; display: inline-block; }
        .profile-banner { display: flex; flex-direction: column; gap: 0.5rem; background: rgba(0, 255, 200, 0.1); border: 1px solid rgba(0, 255, 200, 0.3); border-radius: 1rem; padding: 0.8rem; margin-bottom: 1rem; }
        .profile-banner img { width: 100%; height: auto; max-height: 200px; object-fit: contain; border-radius: 0.6rem; border: 1px solid rgba(0, 255, 200, 0.3); box-shadow: 0 0 15px rgba(0, 255, 200, 0.2); }
        .profile-banner .profile-label { font-family: 'Orbitron', sans-serif; color: #00ffcc; font-size: 0.8rem; letter-spacing: 1px; text-align: center; }
        .telegram-buttons { display: flex; gap: 1rem; margin-top: 1rem; }
        .telegram-btn { flex: 1; background: linear-gradient(135deg, #229ED9, #1c93d3); border: none; border-radius: 2rem; padding: 0.8rem 1rem; color: white; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; cursor: pointer; text-decoration: none; transition: 0.3s; box-shadow: 0 4px 15px rgba(34, 158, 217, 0.4); }
        .telegram-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34, 158, 217, 0.6); }
        .telegram-btn svg { width: 20px; height: 20px; }
        @media (max-width:400px) { .button-group { flex-direction: column; } .header h1 { font-size: 1.4rem; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #00ffcc; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="splashScreen">
        <div style="height: 40px;"></div>
        <div class="splash-title">RX RABBI </div>
        <div class="splash-subtitle">PLAYER INFO</div>
        <div class="custom-loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
    </div>

    <div id="mainApp" class="app-container">
        <div class="header">
            <div class="header-text">
                <h1>RX RABBI  PLAYER INFO</h1>
                <div class="subtitle">⚡ Free Fire UID Information Finder ⚡</div>
            </div>
        </div>

        <div class="music-player" id="musicPlayer">
            <div class="eq-container" id="eqContainer">
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
            </div>
            <div class="song-info">
                <span class="song-label">🎵 NOW PLAYING</span>
                <span class="song-name" id="songName">Select a track</span>
                <span class="song-duration" id="songDuration">--:--</span>
            </div>
            <div class="volume-container">
                <span class="volume-icon" id="volumeIcon" title="Mute/Unmute">🔊</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" title="Volume">
            </div>
            <div class="music-controls">
                <button class="music-btn" id="prevBtn" title="Previous Track">⏮</button>
                <button class="music-btn play-btn" id="playPauseBtn" title="Play/Pause">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="music-btn" id="nextBtn" title="Next Track">⏭</button>
            </div>
        </div>

        <div class="glass-card search-section">
            <div class="input-wrapper"><input type="text" id="uidInput" placeholder="Enter Free Fire UID..." inputmode="numeric" autocomplete="off"></div>
            <div class="button-group">
                <button id="searchBtn" class="btn btn-primary"><span>🔍</span> Search</button>
                <button id="clearBtn" class="btn"><span>🗑️</span> Clear</button>
                <button id="refreshBtn" class="btn"><span>🔄</span> Refresh</button>
            </div>
            <div id="recentContainer" style="margin-top:0.3rem;">
                <div style="display:flex; align-items:center; justify-content:space-between;">
                    <span style="font-size:0.8rem; color:rgba(0,255,200,0.7); font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:1px;">📜 Recent Searches</span>
                    <button id="clearHistoryBtn" class="clear-history">Clear History</button>
                </div>
                <div id="historyList" class="recent-searches"></div>
            </div>
        </div>

        <div class="page-indicators" id="pageIndicators" style="display:none;">
            <span class="dot active" data-page="0"></span>
            <span class="dot" data-page="1"></span>
        </div>

        <div class="slider-container" id="sliderContainer">
            <div class="page" id="infoPage"><div id="resultsContainer"></div></div>
            <div class="page" id="imagesPage">
                <div class="glass-card" style="min-height:200px;">
                    <div class="card-title">🎨 PLAYER COLLECTION</div>
                    <div id="imagesContainer"><p style="color:rgba(0,255,200,0.6); text-align:center;">Search a UID to load collection</p></div>
                </div>
            </div>
        </div>

        <div class="footer">⚡ Powered By Rx RABBI  ⚡</div>
   </div>
    <div id="backToTop">↑</div>

    <script>
        (function() {
            const splash = document.getElementById('splashScreen');
            const mainApp = document.getElementById('mainApp');
            const uidInput = document.getElementById('uidInput');
            const searchBtn = document.getElementById('searchBtn');
            const clearBtn = document.getElementById('clearBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const resultsContainer = document.getElementById('resultsContainer');
            const historyList = document.getElementById('historyList');
            const clearHistoryBtn = document.getElementById('clearHistoryBtn');
            const backToTopBtn = document.getElementById('backToTop');
            const sliderContainer = document.getElementById('sliderContainer');
            const pageIndicators = document.getElementById('pageIndicators');
            const imagesContainer = document.getElementById('imagesContainer');
            const dots = document.querySelectorAll('.dot');

            let lastSearchedUid = localStorage.getItem('asdCodexLastUid') || '';
            let imageLoadController = null;

            const songs = [
                { name: 'Neon Pulse', url: 'https://files.catbox.moe/l7wfwx.mp3' },
                { name: 'Cyber Flow', url: 'https://files.catbox.moe/2ewjf8.mp3' },
                { name: 'Data Stream', url: 'https://files.catbox.moe/mtn8wv.mp3' },
                { name: 'Matrix Code', url: 'https://files.catbox.moe/hqlgjm.mp3' }
            ];

            const musicPlayer = document.getElementById('musicPlayer');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const playIcon = document.getElementById('playIcon');
            const pauseIcon = document.getElementById('pauseIcon');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const songNameEl = document.getElementById('songName');
            const songDurationEl = document.getElementById('songDuration');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeIcon = document.getElementById('volumeIcon');

            const audio = new Audio();
            audio.preload = 'metadata';
            audio.volume = parseFloat(localStorage.getItem('asdCodexVolume') || '0.5');
            volumeSlider.value = Math.round(audio.volume * 100);

            let currentSongIndex = parseInt(localStorage.getItem('asdCodexSongIndex') || '-1');
            let isPlaying = false;
            let songHistory = JSON.parse(localStorage.getItem('asdCodexSongHistory') || '[]');
            let userInteracted = false;
            let durationUpdateInterval = null;

            if (currentSongIndex < 0 || currentSongIndex >= songs.length) {
                currentSongIndex = Math.floor(Math.random() * songs.length);
                localStorage.setItem('asdCodexSongIndex', currentSongIndex);
            }

            function getRandomSongIndex(excludeIndex) {
                if (songs.length <= 1) return 0;
                let newIndex;
                do { newIndex = Math.floor(Math.random() * songs.length); } while (newIndex === excludeIndex && songs.length > 1);
                return newIndex;
            }

            function loadSong(index) {
                if (index < 0 || index >= songs.length) return;
                currentSongIndex = index;
                const song = songs[index];
                audio.src = song.url;
                audio.load();
                songNameEl.textContent = song.name;
                songDurationEl.textContent = '--:--';
                localStorage.setItem('asdCodexSongIndex', index);
                updateVolumeIcon();
            }

            function formatTime(seconds) {
                if (isNaN(seconds) || !isFinite(seconds)) return '--:--';
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
            }

            function startDurationUpdates() {
                stopDurationUpdates();
                durationUpdateInterval = setInterval(() => {
                    if (audio.duration && isFinite(audio.duration)) {
                        songDurationEl.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
                    } else if (audio.currentTime > 0) {
                        songDurationEl.textContent = formatTime(audio.currentTime);
                    }
                }, 500);
            }

            function stopDurationUpdates() {
                if (durationUpdateInterval) { clearInterval(durationUpdateInterval); durationUpdateInterval = null; }
            }

            function setPlayingState(playing) {
                isPlaying = playing;
                if (playing) {
                    musicPlayer.classList.add('playing');
                    playIcon.style.display = 'none'; pauseIcon.style.display = 'block';
                    startDurationUpdates();
                } else {
                    musicPlayer.classList.remove('playing');
                    playIcon.style.display = 'block'; pauseIcon.style.display = 'none';
                    stopDurationUpdates();
                }
            }

            function playCurrentSong() {
                if (!audio.src || audio.src === window.location.href) { loadSong(currentSongIndex); }
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => { setPlayingState(true); }).catch(err => {
                        console.log('Playback prevented:', err.message);
                        setPlayingState(false);
                        if (!userInteracted) { showToast('🎵 Tap play to start music'); }
                    });
                }
            }

            function pauseSong() { audio.pause(); setPlayingState(false); }

            function togglePlayPause() {
                userInteracted = true;
                if (isPlaying) { pauseSong(); } else { playCurrentSong(); }
            }

            function playNextSong() {
                userInteracted = true;
                if (currentSongIndex >= 0 && currentSongIndex < songs.length) {
                    songHistory.push(currentSongIndex);
                    if (songHistory.length > 10) songHistory.shift();
                    localStorage.setItem('asdCodexSongHistory', JSON.stringify(songHistory));
                }
                const nextIndex = getRandomSongIndex(currentSongIndex);
                loadSong(nextIndex); playCurrentSong();
            }

            function playPrevSong() {
                userInteracted = true;
                if (songHistory.length > 0) {
                    const prevIndex = songHistory.pop();
                    localStorage.setItem('asdCodexSongHistory', JSON.stringify(songHistory));
                    loadSong(prevIndex); playCurrentSong();
                } else {
                    const prevIndex = getRandomSongIndex(currentSongIndex);
                    loadSong(prevIndex); playCurrentSong();
                }
            }

            function updateVolumeIcon() {
                const vol = audio.volume;
                if (vol === 0) { volumeIcon.textContent = '🔇'; }
                else if (vol < 0.4) { volumeIcon.textContent = '🔈'; }
                else if (vol < 0.7) { volumeIcon.textContent = '🔉'; }
                else { volumeIcon.textContent = '🔊'; }
            }

            playPauseBtn.addEventListener('click', togglePlayPause);
            nextBtn.addEventListener('click', playNextSong);
            prevBtn.addEventListener('click', playPrevSong);

            volumeSlider.addEventListener('input', () => {
                const vol = parseInt(volumeSlider.value) / 100;
                audio.volume = vol;
                localStorage.setItem('asdCodexVolume', vol);
                updateVolumeIcon();
            });

            volumeIcon.addEventListener('click', () => {
                if (audio.volume > 0) { audio.volume = 0; volumeSlider.value = 0; }
                else { const vol = 0.5; audio.volume = vol; volumeSlider.value = 50; }
                localStorage.setItem('asdCodexVolume', audio.volume);
                updateVolumeIcon();
            });

            audio.addEventListener('ended', () => {
                setPlayingState(false);
                const nextIndex = getRandomSongIndex(currentSongIndex);
                if (currentSongIndex >= 0 && currentSongIndex < songs.length) {
                    songHistory.push(currentSongIndex);
                    if (songHistory.length > 10) songHistory.shift();
                    localStorage.setItem('asdCodexSongHistory', JSON.stringify(songHistory));
                }
                loadSong(nextIndex); playCurrentSong();
            });

            audio.addEventListener('loadedmetadata', () => {
                if (audio.duration && isFinite(audio.duration)) { songDurationEl.textContent = '00:00 / ' + formatTime(audio.duration); }
            });

            audio.addEventListener('loadstart', () => { songDurationEl.textContent = 'Loading...'; });

            audio.addEventListener('error', () => {
                songDurationEl.textContent = 'Error loading'; setPlayingState(false);
                console.log('Audio error for:', audio.src);
                setTimeout(() => { const nextIndex = getRandomSongIndex(currentSongIndex); loadSong(nextIndex); }, 1500);
            });

            audio.addEventListener('play', () => { setPlayingState(true); });
            audio.addEventListener('pause', () => { setPlayingState(false); });

            loadSong(currentSongIndex); updateVolumeIcon(); setPlayingState(false);

            function hideSplashAndShowApp() {
                try { if (splash) splash.remove(); } catch (e) {}
                try { if (mainApp) mainApp.style.display = 'flex'; } catch (e) {}
                renderHistory();
                if (lastSearchedUid) uidInput.value = lastSearchedUid;
                volumeSlider.value = Math.round(audio.volume * 100);
                updateVolumeIcon();
                playCurrentSong();
            }

            window.addEventListener('load', function() { setTimeout(hideSplashAndShowApp, 3000); });
            setTimeout(function() { if (splash && splash.parentNode) hideSplashAndShowApp(); }, 3500);

            function updateActiveDot() {
                const idx = Math.round(sliderContainer.scrollLeft / sliderContainer.clientWidth);
                dots.forEach((d, i) => d.classList.toggle('active', i === idx));
            }
            sliderContainer.addEventListener('scroll', updateActiveDot);
            dots.forEach(d => d.addEventListener('click', () => {
                sliderContainer.scrollTo({ left: +d.dataset.page * sliderContainer.clientWidth, behavior: 'smooth' });
            }));

            function showPageIndicators(show) { pageIndicators.style.display = show ? 'flex' : 'none'; }

            function formatTimestamp(s) {
                if (!s) return '—';
                const d = new Date(s * 1000);
                return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            }

            function showToast(msg, isErr = false) {
                const old = document.querySelector('.toast-message');
                if (old) old.remove();
                const t = document.createElement('div');
                t.className = 'toast-message';
                t.style.background = isErr ? 'rgba(0, 120, 100, 0.95)' : 'rgba(0, 20, 20, 0.95)';
                t.textContent = msg;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 2500);
            }

            function updateHistory(uid) {
                let h = JSON.parse(localStorage.getItem('asdCodexHistory') || '[]');
                h = h.filter(u => u !== uid);
                h.unshift(uid);
                if (h.length > 5) h.length = 5;
                localStorage.setItem('asdCodexHistory', JSON.stringify(h));
                renderHistory();
            }

            function renderHistory() {
                const h = JSON.parse(localStorage.getItem('asdCodexHistory') || '[]');
                historyList.innerHTML = h.length ? '' : '<span style="color:rgba(0,255,200,0.4);font-size:0.8rem;">No recent searches</span>';
                h.forEach(uid => {
                    const c = document.createElement('span');
                    c.className = 'history-chip';
                    c.textContent = uid;
                    c.onclick = () => { uidInput.value = uid; performSearch(uid); };
                    historyList.appendChild(c);
                });
            }

            function esc(s) { return String(s).replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[m]); }

            function extractIdsFromArray(arr) {
                if (!Array.isArray(arr)) return [];
                const ids = [];
                arr.forEach(item => {
                    if (typeof item === 'number' || typeof item === 'string') ids.push(item);
                    else if (typeof item === 'object' && item !== null && item.id) ids.push(item.id);
                });
                return ids;
            }

            function collectImageIds(data) {
                const ids = new Set();
                const addArr = arr => extractIdsFromArray(arr).forEach(id => ids.add(id));
                const addVal = val => { if (val !== undefined && val !== null) ids.add(val); };
                addArr(data.weaponSkinShows); addArr(data.clothes);
                addVal(data.avatarId); addVal(data.gameBagShow); addVal(data.skinId);
                const info = data.basicInfo || data.playerInfo || data.data || {};
                addArr(info.weaponSkinShows); addArr(info.clothes);
                addVal(info.avatarId); addVal(info.gameBagShow); addVal(info.skinId);
                const extras = [data.equippedItems, info.equippedItems];
                extras.forEach(arr => addArr(arr));
                console.log('🆔 Collected IDs (no badge):', [...ids]);
                return [...ids];
            }

            async function loadProfileImage(uid) {
                try {
                    const res = await fetch(`https://banner-api-g7sh.vercel.app/profile?uid=${uid}`);
                    if (!res.ok) return null;
                    const contentType = res.headers.get('content-type');
                    if (contentType && contentType.startsWith('image/')) {
                        const blob = await res.blob();
                        return URL.createObjectURL(blob);
                    }
                    const data = await res.json();
                    console.log('📸 Profile API Response:', data);
                    const possibleFields = ['profilePic', 'avatar', 'image', 'img', 'url', 'picture', 'photo', 'src'];
                    for (const field of possibleFields) if (data[field]) return data[field];
                    if (typeof data === 'string') return data;
                    const values = Object.values(data);
                    for (const val of values) if (typeof val === 'string' && val.startsWith('http')) return val;
                    return null;
                } catch (e) { console.log('❌ Profile API Error:', e); return null; }
            }

            function loadImagesSequentially(ids, profileUrl, uid) {
                if (imageLoadController) imageLoadController.abort();
                imageLoadController = new AbortController();
                const signal = imageLoadController.signal;
                imagesContainer.innerHTML = '';
                if (!ids.length && !profileUrl) {
                    imagesContainer.innerHTML = '<p style="color:rgba(0,255,200,0.6); text-align:center;">No collectible items found.</p>';
                    return;
                }
                const counter = document.createElement('div');
                counter.className = 'counter-badge'; counter.id = 'imgCounter';
                const totalItems = (profileUrl ? 1 : 0) + ids.length;
                counter.textContent = `0/${totalItems} loaded`;
                imagesContainer.appendChild(counter);
                let loadedCount = 0;
                if (profileUrl) {
                    const banner = document.createElement('div');
                    banner.className = 'profile-banner';
                    const label = document.createElement('div');
                    label.className = 'profile-label'; label.textContent = 'PROFILE';
                    const img = document.createElement('img');
                    img.src = profileUrl; img.alt = 'Profile Banner';
                    img.onload = () => { loadedCount++; counter.textContent = `${loadedCount}/${totalItems} loaded`; };
                    img.onerror = () => { loadedCount++; counter.textContent = `${loadedCount}/${totalItems} loaded`; banner.style.display = 'none'; };
                    banner.appendChild(label); banner.appendChild(img);
                    imagesContainer.appendChild(banner);
                }
                const grid = document.createElement('div');
                grid.className = 'images-grid';
                imagesContainer.appendChild(grid);
                ids.forEach(id => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'image-item'; itemDiv.id = `img-${id}`;
                    const placeholder = document.createElement('div');
                    placeholder.className = 'img-placeholder'; placeholder.textContent = '🖼️';
                    itemDiv.appendChild(placeholder);
                    const img = document.createElement('img');
                    img.alt = `Item ${id}`; img.style.display = 'none';
                    itemDiv.appendChild(img); grid.appendChild(itemDiv);
                });
                async function loadOneByOne() {
                    for (const id of ids) {
                        if (signal.aborted) break;
                        const itemDiv = document.getElementById(`img-${id}`);
                        if (!itemDiv) continue;
                        const img = itemDiv.querySelector('img');
                        const placeholder = itemDiv.querySelector('.img-placeholder');
                        try {
                            await new Promise((resolve) => {
                                img.onload = () => { loadedCount++; counter.textContent = `${loadedCount}/${totalItems} loaded`; placeholder.style.display = 'none'; img.style.display = 'block'; resolve(); };
                                img.onerror = () => { loadedCount++; counter.textContent = `${loadedCount}/${totalItems} loaded`; itemDiv.style.display = 'none'; resolve(); };
                                img.src = `https://iconapi.wasmer.app/${id}`;
                            });
                        } catch (e) {}
                        if (!signal.aborted) await new Promise(r => setTimeout(r, 200));
                    }
                    if (!signal.aborted) counter.textContent = `✅ ${loadedCount}/${totalItems} loaded`;
                }
                loadOneByOne();
            }

                const petName = pet.name || '—', petLvl = pet.level ?? '—';
                const gender = social.gender || '—', lang = social.language || '—', sig = social.signature || '—';
                const creditScore = credit.creditScore ?? '—', diamondCost = diamond.diamondCost ?? '—';
                resultsContainer.innerHTML = `

            <div class="info-row"><span class="info-label">Region</span><span class="info-value">${esc(region)}</span></div>

          </div>

          <div class="glass-card"><div class="card-title">🐾 PET INFO</div>

            <div class="info-row"><span class="info-label">Signature</span><span class="info-value">${esc(sig)}</span></div>
          </div>
          <div class="glass-card"><div class="card-title">💳 ACCOUNT</div>
            <div class="info-row"><span class="info-label">Credit Score</span><span class="info-value">${creditScore}</span></div>
            <div class="info-row"><span class="info-label">Diamond Cost</span><span class="info-value">${diamondCost}</span></div>
          </div>
        `;
                window.copyUid = (uid) => navigator.clipboard.writeText(uid).then(() => showToast('✓ UID Copied!'));
                resultsContainer.innerHTML += `
          <div class="telegram-buttons">
            <a href="https://t.me/rxvip420" target="_blank" class="telegram-btn">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.93 1.23-5.46 3.61-.52.36-.99.53-1.41.52-.46-.01-1.35-.26-2.01-.48-.81-.27-1.46-.42-1.4-.88.03-.24.37-.49 1.02-.74 4.01-1.74 6.68-2.89 8.02-3.44 3.82-1.59 4.61-1.86 5.13-1.87.11 0 .37.03.53.17.14.12.18.28.2.45-.01.06.01.24 0 .38z"/></svg>
              Channel
            </a>
            <a href="https://t.me/rxvip420" target="_blank" class="telegram-btn">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.93 1.23-5.46 3.61-.52.36-.99.53-1.41.52-.46-.01-1.35-.26-2.01-.48-.81-.27-1.46-.42-1.4-.88.03-.24.37-.49 1.02-.74 4.01-1.74 6.68-2.89 8.02-3.44 3.82-1.59 4.61-1.86 5.13-1.87.11 0 .37.03.53.17.14.12.18.28.2.45-.01.06.01.24 0 .38z"/></svg>

                const imageIds = collectImageIds(data);
                loadProfileImage(uid).then(profileUrl => { loadImagesSequentially(imageIds, profileUrl, uid); });
                showPageIndicators(true);
                sliderContainer.scrollTo({ left: 0, behavior: 'smooth' });
                document.getElementById('infoPage').scrollTop = 0;
            }

            async function performSearch(uid) {
                uid = uid.trim();
                if (!uid) return showToast('✗ Please enter a UID', true);
                if (!/^\d+$/.test(uid)) return showToast('✗ UID must be numbers only', true);
                searchBtn.disabled = true;
                searchBtn.innerHTML = '<span class="loading-spinner"></span> SEARCHING...';
                resultsContainer.innerHTML = '<div class="glass-card" style="text-align:center;color:#00ffcc;">🔍 Fetching data...</div>';
                imagesContainer.innerHTML = '<p style="color:rgba(0,255,200,0.6); text-align:center;">Waiting for data...</p>';
                showPageIndicators(false);
                try {
                    const res = await fetch(`https://dark-aura-info-api-v2.vercel.app/player-info?uid=${uid}`);
                    if (!res.ok) throw new Error(`Server Error (${res.status})`);
                    const json = await res.json();
                    console.log('📦 Full API Response:', json);
                    if (!json || Object.keys(json).length === 0) throw new Error('Empty response');
                    renderPlayerData(json, uid);
                    lastSearchedUid = uid;
                    localStorage.setItem('asdCodexLastUid', uid);
                    updateHistory(uid);
                    showToast('✅ Search Complete!');
                } catch (e) {
                    resultsContainer.innerHTML = `<div class="glass-card" style="text-align:center;color:#00ffcc;"><p>❌ ${e.message}</p></div>`;
                    imagesContainer.innerHTML = '<p style="color:rgba(0,255,200,0.6); text-align:center;">Error loading data</p>';
                    showToast('❌ ' + e.message, true);
                    showPageIndicators(false);
                } finally {
                    searchBtn.disabled = false;
                    searchBtn.innerHTML = '🔍 Search';
                }
            }

            searchBtn.addEventListener('click', () => performSearch(uidInput.value));
            clearBtn.addEventListener('click', () => {
                if (imageLoadController) imageLoadController.abort();
                uidInput.value = '';
                resultsContainer.innerHTML = '';
                imagesContainer.innerHTML = '<p style="color:rgba(0,255,200,0.6); text-align:center;">Search a UID to load collection</p>';
                showPageIndicators(false);
            });
            refreshBtn.addEventListener('click', () => {
                const uid = uidInput.value.trim() || lastSearchedUid;
                uid ? performSearch(uid) : showToast('No UID to refresh', true);
            });
            uidInput.addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(uidInput.value); });
            clearHistoryBtn.addEventListener('click', () => {
                localStorage.removeItem('asdCodexHistory');
                renderHistory();
                showToast('History Cleared');
            });
            window.addEventListener('scroll', () => { backToTopBtn.style.display = window.scrollY > 350 ? 'flex' : 'none'; });
            backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

            renderHistory();
            if (lastSearchedUid) uidInput.value = lastSearchedUid;
            showPageIndicators(false);
        })();
    </script>
</body>
</html>
